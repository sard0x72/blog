baseURL: "https://again.uz/"   # ← change this to your domain
languageCode: en-us
title: "Sardor"                  # ← change this
theme: PaperMod
pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "sardor"                # ← change this
  description: "Writeups and blog posts"
  author: "sardor"               # ← change this

  defaultTheme: auto                # auto = follows system, or: light / dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"

  homeInfoParams:
    Title: "Hi, I'm Sardor Nuriddinov 👋"   # ← change this
    Content: >
      Welcome to my corner of the internet.
      I write about security, CTFs, and things I find interesting.

  socialIcons:
    - name: github
      url: "https://github.com/sard0x72"    # ← change this
#    - name: twitter
#      url: "https://twitter.com/yourusername"   # ← change or remove

menu:
  main:
    - identifier: writeups
      name: Writeups
      url: /writeups/
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON   # needed for search
